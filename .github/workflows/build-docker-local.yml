name: Build Spring Test Web & Local Docker

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17 via jenv
        run: |
          export PATH="$HOME/.jenv/bin:$PATH"
          eval "$(jenv init -)"
          JAVA_HOME="$(jenv prefix 17)"
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
          echo "$JAVA_HOME/bin" >> $GITHUB_PATH
          java -version

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Build Docker image
        run: docker build -t spring-test-web .

      - name: Stop old container
        run: |
          docker stop spring-test-web || true
          docker rm spring-test-web || true

      - name: Start new container
        run: |
          docker run -d \
            --name spring-test-web \
            --restart always \
            -p 8080:8080 \
            spring-test-web