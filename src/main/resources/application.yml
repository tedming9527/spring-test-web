# CORS 跨域支持
web:
  cors:
    allowed-origins: "http://localhost:5173,http://localhost:5174"
    allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
    allowed-headers: "*"
    allow-credentials: true
spring:
  application:
    name: spring-test-web
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/springtestweb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update  # 可选值：none, validate, update, create, create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        database-platform: org.hibernate.dialect.MySQLInnoDBDialect


springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    try-it-out-enabled: true
    filter: true
    display-request-duration: true
  default-flat-param-object: true
  packages-to-scan: org.example.springtestweb.controller
  group-configs:
    - group: "default"
      paths-to-match: "/**"
      packages-to-scan: org.example.springtestweb.controller
  model-and-view-allowed: true

server:
  port: 8080
